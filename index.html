<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelCraft — Survie & Construction 3D</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Importmap pour charger Three.js comme module ES -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.161.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <!-- Canvas de rendu principal pour la scène 3D -->
  <canvas id="game-canvas"></canvas>

  <!-- Overlay du menu principal -->
  <div id="main-menu" class="menu-overlay">
    <div class="menu-bg"></div>
    <div class="menu-card">
      <h1 class="menu-title">PixelCraft</h1>
      <p class="menu-subtitle">Survie · Construction · Exploration</p>
      <div class="menu-buttons">
        <button id="btn-new" class="btn-primary">Nouvelle partie</button>
        <button id="btn-continue" class="btn-primary">Continuer</button>
        <button id="btn-settings" class="btn-secondary">Paramètres</button>
        <button id="btn-quit" class="btn-secondary">Quitter</button>
      </div>
      <p class="menu-tip" id="menu-tip">Astuce : ZQSD ou WASD pour bouger, Espace pour sauter</p>
    </div>
  </div>

  <!-- Overlay paramètres -->
  <div id="settings-panel" class="overlay hidden">
    <div class="settings-card">
      <h2>Paramètres</h2>
      <div class="settings-row">
        <label>Volume</label>
        <input type="range" id="set-volume" min="0" max="1" step="0.05" value="0.5" />
        <span id="val-volume" class="val">50%</span>
      </div>
      <div class="settings-row">
        <label>Sensibilité</label>
        <input type="range" id="set-sens" min="0.05" max="0.5" step="0.01" value="0.2" />
        <span id="val-sens" class="val">0.20</span>
      </div>
      <div class="settings-row">
        <label>Distance d'affichage</label>
        <input type="range" id="set-view" min="2" max="8" step="1" value="5" />
        <span id="val-view" class="val">5</span>
      </div>
      <div class="settings-row">
        <label>Qualité</label>
        <select id="set-quality">
          <option value="low">Basse</option>
          <option value="medium" selected>Moyenne</option>
          <option value="high">Haute</option>
        </select>
      </div>
      <div class="settings-row">
        <label>Afficher les FPS</label>
        <input type="checkbox" id="set-fps" checked />
      </div>
      <div class="settings-row buttons">
        <button id="btn-del-save" class="btn-danger">Supprimer sauvegarde</button>
        <button id="btn-export-save" class="btn-secondary">Exporter sauvegarde</button>
      </div>
      <div class="settings-row buttons">
        <button id="btn-settings-back" class="btn-primary">Retour</button>
      </div>
    </div>
  </div>

  <!-- Overlay écran de mort -->
  <div id="death-screen" class="overlay hidden">
    <div class="death-card">
      <h1>Vous êtes mort</h1>
      <p id="death-reason">Vous êtes tombé de trop haut.</p>
      <button id="btn-respawn" class="btn-primary">Réapparaître</button>
    </div>
  </div>

  <!-- Overlay inventaire complet -->
  <div id="inventory-overlay" class="overlay hidden">
    <div class="inventory-card">
      <h2>Inventaire</h2>
      <div class="inv-grid" id="inv-grid"></div>
      <p class="hint">Glissez les objets entre les cases. Échap ou E pour fermer.</p>
    </div>
  </div>

  <!-- Overlay artisanat -->
  <div id="crafting-overlay" class="overlay hidden">
    <div class="crafting-card">
      <h2>Artisanat</h2>
      <div class="crafting-recipe-name" id="crafting-recipe-name"></div>
      <div class="crafting-result" id="crafting-result"></div>
      <div class="crafting-grid" id="crafting-grid"></div>
      <button id="btn-craft" class="btn-primary" disabled>Craft</button>
      <button id="btn-craft-close" class="btn-secondary">Fermer</button>
    </div>
  </div>

  <!-- Menu pause (Echap en jeu) -->
  <div id="pause-overlay" class="overlay hidden">
    <div class="pause-card">
      <h2>Pause</h2>
      <button id="btn-resume" class="btn-primary">Reprendre</button>
      <button id="btn-pause-settings" class="btn-secondary">Paramètres</button>
      <button id="btn-save-quit" class="btn-secondary">Sauvegarder et quitter</button>
    </div>
  </div>

  <!-- HUD en jeu (réticule, barres, hotbar) -->
  <div id="hud" class="hud hidden">
    <div id="crosshair"></div>
    <div id="fps-counter">FPS: 0</div>

    <div id="health-bar" class="stat-bar">
      <div id="health-fill" class="bar-fill health">❤</div>
    </div>
    <div id="food-bar" class="stat-bar">
      <div id="food-fill" class="bar-fill food">🍖</div>
    </div>

    <!-- Barre rapide 9 cases -->
    <div id="hotbar"></div>

    <!-- Mini panneau bloc visé -->
    <div id="target-info" class="hidden"></div>
  </div>

  <!-- Overlay chargement -->
  <div id="loading" class="overlay hidden">
    <div class="loading-card">
      <h2 id="loading-text">Génération du monde…</h2>
      <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
    </div>
  </div>

  <!-- Script principal en module ES -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
